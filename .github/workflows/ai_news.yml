name: AI Daily Brief - Pro Mix

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -U feedparser requests beautifulsoup4

      - name: Run AI Agent
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: |
          python - <<'EOF'
          import feedparser
          import requests
          import os, sys, json, re, time, hashlib
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone, timedelta

          # ====== 1. 配置区 ======
          webhook = os.environ.get("WECHAT_WEBHOOK")
          api_key = os.environ.get("AI_API_KEY")

          SOURCES = [
              "https://hnrss.org/frontpage?q=AI",          # 全球最火AI话题
              "https://rsshub.app/pnas/topic/computer-science", # 科技前沿
              "https://huggingface.co/blog/feed.xml",     # AI技术趋势
              "https://openai.com/blog/rss.xml",          
              "https://blog.langchain.dev/rss/",          
          ]

          # 关键词画像
          ECOM_KWS = ["amazon", "listing", "fba", "japan", "jp", "advertising"]
          TEACH_KWS = ["japanese", "teaching", "jlpt", "language", "nihongo"]
          VENUE_KWS = ["stadium", "venue", "association", "smart city", "event", "governance", "digital"]

          HISTORY_FILE = "sent_history.json"

          def load_history():
              if not os.path.exists(HISTORY_FILE): return set()
              try:
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      return set(json.load(f).get("links", []))
              except: return set()

          def save_history(links):
              with open(HISTORY_FILE, "w", encoding="utf-8") as f:
                  json.dump({"links": list(links)[-1000:]}, f)

          def get_github_trending():
              """抓取热门应用"""
              apps = []
              try:
                  url = "https://github.com/trending?since=daily"
                  resp = requests.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=15)
                  soup = BeautifulSoup(resp.text, "html.parser")
                  for art in soup.find_all("article", class_="Box-row")[:20]:
                      t_node = art.h2.a
                      name = t_node.get_text(strip=True).replace(" ", "")
                      link = "https://github.com" + t_node["href"]
                      desc = art.p.get_text(strip=True) if art.p else "AI Tool"
                      if any(k in (name+desc).lower() for k in ["ai", "gpt", "llm", "bot", "tool", "agent", "translate", "automation"]):
                          apps.append({"title": name, "summary": desc, "link": link, "type": "APP"})
              except: pass
              return apps

          def ai_summarize(title, summary, link, role_type="NEWS"):
              # 提示词专门针对你的三重身份做了极致优化
              system_prompt = (
                  "你是一位全能AI情报分析师。用户身份：1.日亚跨境卖家 2.省场馆协会工作人员 3.日语教师家属。"
                  "请用专业且接地气的中文总结。严禁使用Markdown。请严格输出：\n"
                  "1. 标题：[一句吸睛的中文标题]\n"
                  "2. 性质：[工具/资讯/行业风向]\n"
                  "3. 核心价值：[该资讯对电商运营或场馆/协会工作的具体帮助]\n"
                  "4. 生活/教学：[对日语学习或提升个人效率的意义]\n"
                  "5. 建议：[建议用户立刻执行的操作]"
              )
              try:
                  resp = requests.post(
                      "https://api.deepseek.com/chat/completions",
                      headers={"Authorization": f"Bearer {api_key}"},
                      json={
                          "model": "deepseek-chat",
                          "messages": [{"role": "system", "content": system_prompt},
                                       {"role": "user", "content": f"Title: {title}\nSummary: {summary}"}],
                          "temperature": 0.3
                      }, timeout=45
                  )
                  return resp.json()["choices"][0]["message"]["content"].strip()
              except: return f"标题：{title}\n请点击原文查看详情。"

          # ====== 2. 主逻辑 ======
          sent_history = load_history()
          
          # 【桶逻辑】分为应用桶和资讯桶
          app_pool = []
          news_pool = []

          # A. 填充应用桶
          print("获取 GitHub 趋势...")
          raw_apps = get_github_trending()
          for a in raw_apps:
              if a["link"] not in sent_history:
                  app_pool.append(a)

          # B. 填充资讯桶
          print("获取 AI 资讯...")
          for url in SOURCES:
              try:
                  feed = feedparser.parse(requests.get(url, timeout=15).text)
                  for entry in feed.entries[:10]:
                      link = entry.link
                      if link in sent_history: continue
                      
                      title = entry.title
                      summary = BeautifulSoup(entry.get("summary", ""), "html.parser").get_text()[:500]
                      
                      # 打分决定资讯质量
                      score = 0
                      txt = (title + summary).lower()
                      if any(k in txt for k in ECOM_KWS): score += 10
                      if any(k in txt for k in TEACH_KWS): score += 10
                      if any(k in txt for k in VENUE_KWS): score += 10
                      
                      news_pool.append({"title": title, "summary": summary, "link": link, "score": score, "type": "NEWS"})
              except: continue
          
          news_pool.sort(key=lambda x: x["score"], reverse=True)

          # C. 强制混合：取 3 个应用 + 3 条最相关的资讯
          final_list = app_pool[:3] + news_pool[:3]

          if not final_list:
              print("今日无更新")
              sys.exit(0)

          jst_now = (datetime.now(timezone.utc) + timedelta(hours=9)).strftime("%Y-%m-%d")
          msg = f"🚀 AI & GitHub 每日多维简报\n日期：{jst_now}\n"
          msg += "----------------------------\n\n"

          for idx, item in enumerate(final_list, 1):
              print(f"处理第 {idx} 条...")
              summary_ai = ai_summarize(item["title"], item["summary"], item["link"])
              
              tag = "🔥 热门应用" if item.get("type") == "APP" else "💡 行业情报"
              msg += f"【{idx}. {tag}】\n{summary_ai}\n🔗：{item['link']}\n\n"
              sent_history.add(item["link"])
              time.sleep(1.2)

          save_history(sent_history)
          requests.post(webhook, json={"msgtype": "text", "text": {"content": msg}})
          EOF

      - name: Commit & Push history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_history.json || true
          git commit -m "update history" || true
          git push || true
