name: AI Daily Brief & GitHub Trending

on:
  schedule:
    # 每天东京时间 08:30 推送（UTC 23:30）
    - cron: "30 23 * * *"
  workflow_dispatch: # 允许你手动点击 "Run workflow" 测试

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -U feedparser requests beautifulsoup4

      - name: Run AI Agent
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: |
          python - <<'EOF'
          import feedparser
          import requests
          import os, sys, json, re, time, hashlib
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone, timedelta

          # ====== 配置区 ======
          webhook = os.environ.get("WECHAT_WEBHOOK")
          api_key = os.environ.get("AI_API_KEY")

          SOURCES = [
              "https://hnrss.org/frontpage?q=AI",          # Hacker News AI 热点
              "https://rsshub.app/github/trending/daily/python", # GitHub 今日趋势
              "https://huggingface.co/blog/feed.xml",     # 开源前沿
              "https://openai.com/blog/rss.xml",          # OpenAI 官方
              "https://blog.langchain.dev/rss/",          # AI 应用
          ]

          # 关键词加分项
          ECOM_KWS = ["amazon", "listing", "fba", "ads", "seo", "japan", "ppc"]
          TEACH_KWS = ["japanese", "teaching", "jlpt", "grammar", "classroom", "anki"]

          HISTORY_FILE = "sent_history.json"

          def load_history():
              if not os.path.exists(HISTORY_FILE): return set()
              try:
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      return set(json.load(f).get("links", []))
              except: return set()

          def save_history(links):
              with open(HISTORY_FILE, "w", encoding="utf-8") as f:
                  json.dump({"links": list(links)[-1000:]}, f)

          def get_github_trending():
              """抓取 GitHub 今日最火项目"""
              results = []
              try:
                  url = "https://github.com/trending/python?since=daily"
                  headers = {"User-Agent": "Mozilla/5.0"}
                  resp = requests.get(url, headers=headers, timeout=15)
                  soup = BeautifulSoup(resp.text, "html.parser")
                  for art in soup.find_all("article", class_="Box-row")[:5]:
                      t_node = art.h2.a
                      name = t_node.get_text(strip=True)
                      link = "https://github.com" + t_node["href"]
                      desc = art.p.get_text(strip=True) if art.p else "No description"
                      results.append({
                          "title": f"🔥 GitHub爆火: {name}",
                          "summary": desc,
                          "link": link,
                          "is_trending": True
                      })
              except Exception as e: print(f"GH Trending Error: {e}")
              return results

          def ai_summarize(title, summary, link):
              """调用 DeepSeek 总结并关联你的身份"""
              system_prompt = (
                  "你是一位AI情报官。你的读者拥有跨境电商/日语高校教师/省场馆协会工作人员三重身份。请用简练、充满干货的中文总结。"
                  "严禁Markdown符号。固定3行：\n"
                  "1. 标题：[震撼或吸引人的中文标题]\n"
                  "2. 性质：[工具/资讯/趋势]\n"
                  "3. 行动：[建议读者可以怎么做]"
              )
              try:
                  resp = requests.post(
                      "https://api.deepseek.com/chat/completions",
                      headers={"Authorization": f"Bearer {api_key}"},
                      json={
                          "model": "deepseek-chat",
                          "messages": [{"role": "system", "content": system_prompt},
                                       {"role": "user", "content": f"Title: {title}\nSummary: {summary}"}],
                          "temperature": 0.3
                      }, timeout=40
                  )
                  return resp.json()["choices"][0]["message"]["content"].strip()
              except: return f"标题：{title}\n启发：请点击链接查看详情。"

          # ====== 主程序 ======
          sent_history = load_history()
          candidates = []

          # 1. 抓取趋势
          candidates.extend(get_github_trending())

          # 2. 抓取 RSS
          for url in SOURCES:
              try:
                  feed = feedparser.parse(requests.get(url, timeout=15).text)
                  for entry in feed.entries[:10]:
                      link = entry.link
                      if link in sent_history: continue
                      
                      title = entry.title
                      summary = BeautifulSoup(entry.get("summary", ""), "html.parser").get_text()[:500]
                      
                      # 计算初步分值
                      score = 1.0
                      if any(k in (title+summary).lower() for k in ECOM_KWS): score += 2.0
                      if any(k in (title+summary).lower() for k in TEACH_KWS): score += 2.0
                      
                      candidates.append({"title": title, "summary": summary, "link": link, "score": score})
              except: continue

          # 3. 筛选前 5 条发送
          candidates.sort(key=lambda x: x.get("score", 0), reverse=True)
          final_list = []
          for item in candidates:
              if item["link"] not in sent_history:
                  final_list.append(item)
              if len(final_list) >= 5: break

          if not final_list:
              print("今日无新内容")
              sys.exit(0)

          jst_now = (datetime.now(timezone.utc) + timedelta(hours=9)).strftime("%Y-%m-%d")
          msg = f"🚀 AI & GitHub 今日情报局\n日期：{jst_now}\n\n"

          for idx, item in enumerate(final_list, 1):
              summary_ai = ai_summarize(item["title"], item["summary"], item["link"])
              msg += f"【{idx}】\n{summary_ai}\n链接：{item['link']}\n\n"
              sent_history.add(item["link"])
              time.sleep(1)

          save_history(sent_history)
          requests.post(webhook, json={"msgtype": "text", "text": {"content": msg}})
          EOF

      - name: Commit & Push history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_history.json || true
          git commit -m "update history" || true
          git push || true
