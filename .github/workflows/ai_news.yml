name: AI Daily Brief for Amazon JP & Japanese Teaching

on:
  schedule:
    # 每天东京时间 08:30 推送（GitHub Actions 用 UTC；08:30 JST = 23:30 UTC 前一天）
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-daily-brief
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -U feedparser requests beautifulsoup4

      - name: Run AI Daily Brief Bot
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: |
          python - <<'EOF'
          import feedparser
import requests
import os, sys, json, re, time, hashlib
from bs4 import BeautifulSoup
from datetime import datetime, timezone, timedelta

# ====== 1. 配置与环境变量检查 ======
webhook = os.environ.get("WECHAT_WEBHOOK")
api_key = os.environ.get("AI_API_KEY")

if not webhook or not api_key:
    print("错误: 缺少配置变量 WECHAT_WEBHOOK 或 AI_API_KEY")
    sys.exit(1)

# ====== 2. 核心参数设置 ======
# 权重分配：日亚电商 > 日语教学 > 通用AI热点
W_ECOM = 1.5
W_TEACH = 1.2
W_HOT_TREND = 1.8  # 赋予 GitHub Trending 更高权重

# 关键词画像
ECOM_KEYWORDS = ["amazon", "listing", "ads", "fba", "japan", "jp", "inventory", "seo", "consumer", "ppc"]
TEACH_KEYWORDS = ["japanese", "teaching", "jlpt", "n1", "n2", "classroom", "grammar", "pedagogy", "anki"]
GENERAL_KEYWORDS = ["agent", "rag", "workflow", "llm", "vision", "automation", "api", "release"]
# 热点增强词：让脚本更倾向于“爆火”的内容
HOT_KEYWORDS = ["trending", "viral", "breakthrough", "fastest", "star", "hot", "launched", "showcase"]

# RSS 源 (精选高质量/快资讯源)
SOURCES = [
    "https://hnrss.org/frontpage?q=AI",          # Hacker News AI 热点 (极快)
    "https://rsshub.app/github/trending/daily/python", # GitHub 今日 Python 趋势
    "https://huggingface.co/blog/feed.xml",     # 开源模型前沿
    "https://openai.com/blog/rss.xml",          # OpenAI 官方
    "https://blog.langchain.dev/rss/",          # 应用落地参考
    "https://www.unite.ai/category/ai-tools/feed/", # 新工具发布
]

HEADERS = {
    "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
}

# ====== 3. 工具函数 ======
HISTORY_FILE = "sent_history.json"
MAX_HISTORY = 1000

def load_history():
    if not os.path.exists(HISTORY_FILE): return set()
    try:
        with open(HISTORY_FILE, "r", encoding="utf-8") as f:
            data = json.load(f)
            return set(data.get("links", []))
    except: return set()

def save_history(links):
    data = {"links": list(links)[-MAX_HISTORY:]}
    with open(HISTORY_FILE, "w", encoding="utf-8") as f:
        json.dump(data, f, ensure_ascii=False, indent=2)

def normalize(s):
    return re.sub(r"\s+", " ", (s or "").lower()).strip()

def score_entry(title, summary, link):
    text = normalize(title + " " + (summary or ""))
    score = 0.0
    
    # 基础维度得分
    e = sum(1 for kw in ECOM_KEYWORDS if kw in text)
    t = sum(1 for kw in TEACH_KEYWORDS if kw in text)
    g = sum(1 for kw in GENERAL_KEYWORDS if kw in text)
    h = sum(1 for kw in HOT_KEYWORDS if kw in text)
    
    score += W_ECOM * e + W_TEACH * t + g * 1.0 + W_HOT_TREND * h
    
    # 特殊加分：如果是 GitHub 链接或官方教程
    if any(x in link.lower() for x in ["github.com", "tutorial", "guide", "release"]):
        score += 2.5
    return score

# ====== 4. 特殊抓取：GitHub Trending ======
def get_github_trending():
    trending_list = []
    try:
        url = "https://github.com/trending/python?since=daily"
        resp = requests.get(url, headers=HEADERS, timeout=15)
        soup = BeautifulSoup(resp.text, "html.parser")
        items = soup.find_all("article", class_="Box-row")
        
        for item in items[:8]: # 取前8名
            title_node = item.find("h2")
            name = title_node.get_text(strip=True).replace(" ", "")
            link = "https://github.com" + title_node.find("a")["href"]
            desc = item.find("p", class_="col-9").get_text(strip=True) if item.find("p") else ""
            stars = item.find("span", class_="d-inline-block float-sm-right").get_text(strip=True)
            
            trending_list.append({
                "title": f"🔥 GitHub Trending: {name}",
                "summary": f"【今日增长 {stars}】{desc}",
                "link": link,
                "score": 15.0  # 强制高分入选
            })
    except Exception as e:
        print(f"GitHub Trending 抓取失败: {e}")
    return trending_list

# ====== 5. AI 总结逻辑 ======
def deepseek_summarize(title, summary, link):
    system_prompt = (
        "你是一位服务于集合跨境电商卖家与日语教师和体育场馆协会工作人员的一位AI情报专家"
        "请用直白、充满干货的风格总结。严禁使用任何Markdown符号（如# * -等）。"
        "固定输出5行："
        "1. 标题：[一句带情绪的中文，如：重磅！/必看！]"
        "2. 这是什么：[工具/热点/新功能] (15字内)"
        "3. 电商启发：[对日亚选品/广告/运营的实际用处] (40字内)"
        "4. 教学启发：[对日语教学/出题/提效的帮助] (40字内)"
        "5. 立即行动：[给读者的具体建议] (20字内)"
    )
    user_content = f"Title: {title}\nSummary: {summary}\nLink: {link}"
    
    try:
        resp = requests.post(
            "https://api.deepseek.com/chat/completions",
            headers={"Authorization": f"Bearer {api_key}"},
            json={
                "model": "deepseek-chat",
                "messages": [
                    {"role": "system", "content": system_prompt},
                    {"role": "user", "content": user_content}
                ],
                "temperature": 0.3
            },
            timeout=40
        )
        if resp.status_code == 200:
            return resp.json()["choices"][0]["message"]["content"].strip()
    except: pass
    return f"标题：{title}\n性质：未知\n电商：暂无\n教学：暂无\n下一步：点击原文查看"

# ====== 6. 主执行流程 ======
sent_links = load_history()
candidates = []

# A. 抓取 GitHub 趋势
print("正在搜寻 GitHub 今日最火项目...")
candidates.extend([c for c in get_github_trending() if c["link"] not in sent_links])

# B. 抓取 RSS 资讯
print("正在扫描 AI 资讯源...")
for url in SOURCES:
    try:
        f = feedparser.parse(requests.get(url, headers=HEADERS, timeout=15).text)
        for entry in f.entries[:15]:
            link = getattr(entry, "link", "")
            if not link or link in sent_links: continue
            
            title = entry.title
            summary = BeautifulSoup(entry.get("summary", ""), "html.parser").get_text()[:1000]
            sc = score_entry(title, summary, link)
            
            if sc > 2.0:
                candidates.append({"score": sc, "title": title, "summary": summary, "link": link})
    except: continue

# C. 筛选与发送
if not candidates:
    print("今日无符合质量的热点资讯。")
    sys.exit(0)

candidates.sort(key=lambda x: x["score"], reverse=True)
picked = candidates[:5] # 每天精选 5 条

today_jst = (datetime.now(timezone.utc) + timedelta(hours=9)).strftime("%Y-%m-%d")
final_message = f"🚀 AI & GitHub 今日情报 (日亚x日语)\n日期：{today_jst}\n\n"

for idx, item in enumerate(picked, 1):
    print(f"总结第 {idx} 条: {item['title']}")
    summary_text = deepseek_summarize(item["title"], item["summary"][:600], item["link"])
    # 清洗可能残余的符号
    summary_text = re.sub(r'[*#`\-]', '', summary_text)
    
    final_message += f"【{idx}】\n{summary_text}\n链接：{item['link']}\n\n"
    sent_links.add(item["link"])
    time.sleep(1) # 频率控制

# D. 历史保存与推送
save_history(sent_links)
try:
    requests.post(webhook, json={"msgtype": "text", "text": {"content": final_message}}, timeout=15)
    print("推送成功！")
except Exception as e:
    print(f"推送失败: {e}")
    
          EOF

      - name: Commit sent history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_history.json
          git commit -m "Update sent history" || echo "No changes to commit"
          git push
