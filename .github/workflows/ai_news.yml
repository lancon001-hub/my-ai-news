name: AI Daily Brief - Professional Edition

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -U feedparser requests beautifulsoup4

      - name: Run AI Agent
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
        run: |
          python - <<'EOF'
          import feedparser
          import requests
          import os, sys, json, re, time, hashlib
          from bs4 import BeautifulSoup
          from datetime import datetime, timezone, timedelta

          # ====== 配置区 ======
          webhook = os.environ.get("WECHAT_WEBHOOK")
          api_key = os.environ.get("AI_API_KEY")

          # 资讯源补充了智慧建筑与数字化转型
          SOURCES = [
              "https://hnrss.org/frontpage?q=AI",          
              "https://huggingface.co/blog/feed.xml",     
              "https://openai.com/blog/rss.xml",          
              "https://blog.langchain.dev/rss/",          
              "https://www.unite.ai/category/ai-tools/feed/",
          ]

          # 关键词词库
          ECOM_KWS = ["amazon", "listing", "fba", "ads", "seo", "japan", "ppc"]
          TEACH_KWS = ["japanese", "teaching", "jlpt", "grammar", "classroom", "anki"]
          # 新增：场馆与协会关键词
          VENUE_KWS = ["stadium", "venue", "association", "smart city", "event management", "digital twin", "facility", "iot"]

          HISTORY_FILE = "sent_history.json"

          def load_history():
              if not os.path.exists(HISTORY_FILE): return set()
              try:
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      return set(json.load(f).get("links", []))
              except: return set()

          def save_history(links):
              with open(HISTORY_FILE, "w", encoding="utf-8") as f:
                  json.dump({"links": list(links)[-1000:]}, f)

          def get_github_trending():
              results = []
              try:
                  url = "https://github.com/trending?since=daily"
                  headers = {"User-Agent": "Mozilla/5.0"}
                  resp = requests.get(url, headers=headers, timeout=15)
                  soup = BeautifulSoup(resp.text, "html.parser")
                  for art in soup.find_all("article", class_="Box-row")[:15]:
                      t_node = art.h2.a
                      name = t_node.get_text(strip=True).replace(" ", "")
                      link = "https://github.com" + t_node["href"]
                      desc = art.p.get_text(strip=True) if art.p else ""
                      full_text = (name + desc).lower()
                      if any(k in full_text for k in ["ai", "gpt", "llm", "bot", "tool", "agent", "translate", "automation", "data"]):
                          results.append({"title": f"🔥 GitHub爆火: {name}", "summary": desc, "link": link, "type": "APP", "score": 100})
              except: pass
              return results

          def ai_summarize(title, summary, link, is_app=False):
              # 核心：在这里植入了场馆协会身份
              system_prompt = (
                  "你是一位全能AI情报官，服务于一位身兼‘日亚电商卖家’、‘省场馆协会工作人员’及‘日语教师家属’的多职能用户。"
                  "请用专业、干货的中文总结。严禁使用Markdown。请严格输出：\n"
                  "1. 标题：[吸引人的中文标题]\n"
                  "2. 性质：[工具/资讯/行业动态]\n"
                  "3. 商业价值：[对电商/场馆运营/协会工作的具体启发]\n"
                  "4. 教学价值：[对日语教学或个人效率的提效点]\n"
                  "5. 行动：[建议用户执行的操作]"
              )
              try:
                  resp = requests.post(
                      "https://api.deepseek.com/chat/completions",
                      headers={"Authorization": f"Bearer {api_key}"},
                      json={
                          "model": "deepseek-chat",
                          "messages": [{"role": "system", "content": system_prompt},
                                       {"role": "user", "content": f"Title: {title}\nSummary: {summary}"}],
                          "temperature": 0.3
                      }, timeout=45
                  )
                  return resp.json()["choices"][0]["message"]["content"].strip()
              except: return f"标题：{title}\n请点击原文查看详情。"

          # ====== 主逻辑 ======
          sent_history = load_history()
          all_candidates = []

          all_candidates.extend(get_github_trending())

          for url in SOURCES:
              try:
                  feed = feedparser.parse(requests.get(url, timeout=15).text)
                  for entry in feed.entries[:10]:
                      link = entry.link
                      if link in sent_history: continue
                      title = entry.title
                      summary = BeautifulSoup(entry.get("summary", ""), "html.parser").get_text()[:500]
                      
                      score = 1.0
                      text_lower = (title + summary).lower()
                      # 权重计算：命中任何一个身份关键词都大幅提分
                      if any(k in text_lower for k in ECOM_KWS): score += 15.0
                      if any(k in text_lower for k in TEACH_KWS): score += 15.0
                      if any(k in text_lower for k in VENUE_KWS): score += 15.0
                      
                      all_candidates.append({"title": title, "summary": summary, "link": link, "score": score, "type": "NEWS"})
              except: continue

          all_candidates.sort(key=lambda x: x.get("score", 0), reverse=True)
          final_list = []
          for item in all_candidates:
              if item["link"] not in sent_history:
                  final_list.append(item)
              if len(final_list) >= 6: break

          if not final_list: sys.exit(0)

          jst_now = (datetime.now(timezone.utc) + timedelta(hours=9)).strftime("%Y-%m-%d")
          msg = f"🚀 AI & GitHub 每日跨界情报\n日期：{jst_now}\n----------------------------\n\n"

          for idx, item in enumerate(final_list, 1):
              summary_ai = ai_summarize(item["title"], item["summary"], item["link"], (item["type"] == "APP"))
              prefix = "【🔥 热门应用】" if item["type"] == "APP" else f"【💡 行业情报 {idx}】"
              msg += f"{prefix}\n{summary_ai}\n🔗：{item['link']}\n\n"
              sent_history.add(item["link"])
              time.sleep(1.2)

          save_history(sent_history)
          requests.post(webhook, json={"msgtype": "text", "text": {"content": msg}})
          EOF

      - name: Commit & Push history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_history.json || true
          git commit -m "update history" || true
          git push || true
